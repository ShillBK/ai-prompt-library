<!DOCTYPE html>

<html>
<head>
<title>AI Prompt Library</title>

<style>
*{box-sizing:border-box;}

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
transition:0.3s;
}

.dark{
background:#121212;
color:white;
}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.prompt{
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.dark .prompt{
background:#1e1e1e;
}

button{
margin-top:8px;
margin-right:5px;
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.copy{background:black;color:white;}
.vote{background:#ff9800;color:white;}
.edit{background:#2196f3;color:white;}
.delete{background:#f44336;color:white;}

.form-box{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
}

.dark .form-box{
background:#1e1e1e;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}
</style>

</head>

<body>

<header>
<h2>🚀 AI Prompt Library</h2>
<button onclick="toggleDark()">Dark Mode</button>
</header>

<div class="container">

<div class="search">
<input type="text" id="searchInput" placeholder="Search prompts..." onkeyup="searchPrompts()">
</div>

<div id="promptList"></div>

<div class="form-box">
<h3>Submit Your Prompt</h3>

<input id="title" placeholder="Prompt Title">
<textarea id="text" placeholder="Prompt text"></textarea>

<button onclick="addPrompt()">Submit Prompt</button>

</div>

</div>

<script>

let prompts = JSON.parse(localStorage.getItem("prompts") || "[]")

function save(){
localStorage.setItem("prompts", JSON.stringify(prompts))
}

function render(){

let list = document.getElementById("promptList")
list.innerHTML = ""

prompts.forEach((p,index)=>{

let div = document.createElement("div")
div.className="prompt"

div.innerHTML=`
<h3>${p.title}</h3>
<p>${p.text}</p>

<button class="copy" onclick="copyPrompt('${p.text}',this)">Copy</button>

<button class="vote" onclick="vote(${index})">⭐ ${p.votes}</button>

<button class="edit" onclick="editPrompt(${index})">Edit</button>

<button class="delete" onclick="deletePrompt(${index})">Delete</button>
`

list.appendChild(div)

})

}

function addPrompt(){

let title=document.getElementById("title").value
let text=document.getElementById("text").value

if(title==""||text==""){
alert("Fill all fields")
return
}

prompts.push({
title:title,
text:text,
votes:0
})

save()
render()

document.getElementById("title").value=""
document.getElementById("text").value=""

}

function copyPrompt(text,btn){

navigator.clipboard.writeText(text)

btn.innerText="Copied"

setTimeout(()=>{
btn.innerText="Copy"
},2000)

}

function vote(i){

prompts[i].votes++

save()
render()

}

function editPrompt(i){

let newText=prompt("Edit prompt",prompts[i].text)

if(newText){
prompts[i].text=newText
save()
render()
}

}

function deletePrompt(i){

prompts.splice(i,1)

save()
render()

}

function searchPrompts(){

let input=document.getElementById("searchInput").value.toLowerCase()

let cards=document.getElementsByClassName("prompt")

for(let i=0;i<cards.length;i++){

let text=cards[i].innerText.toLowerCase()

cards[i].style.display=text.includes(input)?"block":"none"

}

}

function toggleDark(){
document.body.classList.toggle("dark")
}

render()

</script>

</body>
</html>
